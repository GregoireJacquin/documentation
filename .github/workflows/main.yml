name: Build & Publish documentation

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Mis à jour de v3 à v4
      - name: Set up Python
        uses: actions/setup-python@v5 # Mis à jour de v3 à v5
        with:
          python-version: '3.x' # Ajouté pour éviter l'erreur matrix manquante
      - name: Install dependencies
        run: |
          python -m pip install mkdocs
          python -m pip install mkdocs-material
      - name: Build site
        run: |
          mkdocs build
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3 # Correction : Passage en v3 (qui remplace l'ancien upload-artifact sous le capot)
        with:
          path: ./site

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # Mis à jour de v1 à v4 (indispensable pour fonctionner avec upload-pages-artifact@v3)